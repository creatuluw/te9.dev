<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Test Email</title>
  <!--[if mso]>
  <style type="text/css">
    body, table, td {font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif !important;}
  </style>
  <![endif]-->
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; line-height: 1.6; color: #18181b; background-color: #fafafa; margin: 0; padding: 0;">
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #fafafa;">
    <tr>
      <td align="center" style="padding: 20px 0;">
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" style="max-width: 600px; background-color: #ffffff; border-radius: 8px; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1); overflow: hidden;">
          <tr>
            <td style="background: linear-gradient(to right, #18181b, #27272a); padding: 32px; text-align: center;">
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr>
                  <td align="center" style="padding-bottom: 16px;">
                    <div style="display: inline-block; width: 40px; height: 40px; line-height: 40px; background-color: rgba(255,255,255,0.15); border-radius: 10px; text-align: center; font-size: 20px; font-weight: 700; color: #ffffff;">T</div>
                  </td>
                </tr>
              </table>
              <h1 style="color: #ffffff; margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -0.025em;">Test Email</h1>
            </td>
          </tr>
          <tr>
            <td style="padding: 32px;">
              <p style="margin: 0 0 16px 0; font-size: 16px; color: #18181b;">
                This is a test email from the <strong>te9.dev</strong> platform.
              </p>
              <p style="margin: 0 0 16px 0; font-size: 16px; color: #71717a;">
                If you received this email, the email service is configured correctly!
              </p>
              <div style="margin: 32px 0; text-align: center;">
                <a href="https://te9.dev" style="display: inline-block; background-color: #18181b; color: #ffffff; text-decoration: none; padding: 12px 24px; border-radius: 6px; font-size: 14px; font-weight: 500;">
                  Go to te9.dev
                </a>
              </div>
              <div style="margin-top: 24px; padding-top: 16px; border-top: 1px solid #e4e4e7;">
                <p style="margin: 0; font-size: 14px; color: #71717a;">Sent at: {{timestamp}}</p>
              </div>
            </td>
          </tr>
          <tr>
            <td style="padding: 24px 32px; background-color: #fafafa; border-top: 1px solid #e4e4e7;">
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr>
                  <td align="center">
                    <div style="display: inline-block; width: 20px; height: 20px; line-height: 20px; background-color: #18181b; border-radius: 4px; text-align: center; font-size: 10px; font-weight: 700; color: #ffffff; vertical-align: middle;">T</div>
                    <span style="font-size: 12px; color: #71717a; vertical-align: middle; margin-left: 6px;">&copy; 2025 te9.dev</span>
                  </td>
                </tr>
                <tr>
                  <td align="center" style="padding-top: 8px;">
                    <p style="margin: 0; font-size: 11px; color: #a1a1aa; text-align: center;">This is an automated notification. Please do not reply to this email.</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
