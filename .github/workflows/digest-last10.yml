name: Digest — Last 10 Analyzed

on:
  workflow_run:
    workflows: ["Sync Raindrop Bookmarks"]
    types: [completed]
  workflow_dispatch:

jobs:
  digest:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Generate last-10 digest and send email
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIGEST_RECIPIENT: ${{ secrets.DIGEST_RECIPIENT }}
          DIGEST_BASE_URL: ${{ secrets.DIGEST_BASE_URL }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM_EMAIL: ${{ secrets.SMTP_FROM_EMAIL }}
          SMTP_FROM_NAME: ${{ secrets.SMTP_FROM_NAME }}
        run: node scripts/generate-digest.js --type last10 --send
