<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Nieuw bericht op {{entityType}} &lsquo;{{entityName}}&rsquo;</title>
  <!--[if mso]>
  <style type="text/css">
    body, table, td {font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif !important;}
  </style>
  <![endif]-->
</head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; line-height: 1.6; color: #18181b; background-color: #fafafa; margin: 0; padding: 0;">
  <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%" style="background-color: #fafafa;">
    <tr>
      <td align="center" style="padding: 20px 0;">
        <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="600" style="max-width: 600px; background-color: #ffffff; border-radius: 8px; box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1); overflow: hidden;">
          <tr>
            <td style="background: linear-gradient(to right, #18181b, #27272a); padding: 32px; text-align: center;">
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr>
                  <td align="center" style="padding-bottom: 16px;">
                    <div style="display: inline-block; width: 40px; height: 40px; line-height: 40px; background-color: rgba(255,255,255,0.15); border-radius: 10px; text-align: center; font-size: 20px; font-weight: 700; color: #ffffff;">K</div>
                  </td>
                </tr>
              </table>
              <h1 style="color: #ffffff; margin: 0; font-size: 22px; font-weight: 600; letter-spacing: -0.025em;">Nieuw bericht</h1>
            </td>
          </tr>
          <tr>
            <td style="padding: 32px;">
              <p style="margin: 0 0 12px 0; font-size: 14px; color: #71717a;">
                <strong style="color: #18181b;">{{senderName}}</strong> schreef op {{entityType}} <strong>{{entityName}}</strong>:
              </p>
              <div style="background-color: #fafafa; border: 1px solid #e4e4e7; border-radius: 6px; padding: 16px; margin: 16px 0;">
                <p style="margin: 0; color: #18181b; font-size: 14px; line-height: 1.5;">{{messageText}}</p>
              </div>
              <div style="margin: 32px 0; text-align: center;">
                <a href="{{entityUrl}}" style="display: inline-block; background-color: #18181b; color: #ffffff; text-decoration: none; padding: 12px 24px; border-radius: 6px; font-size: 14px; font-weight: 500;">
                  Bekijk bericht
                </a>
              </div>
            </td>
          </tr>
          <tr>
            <td style="padding: 24px 32px; background-color: #fafafa; border-top: 1px solid #e4e4e7;">
              <table role="presentation" cellspacing="0" cellpadding="0" border="0" width="100%">
                <tr>
                  <td align="center">
                    <a href="{{unsubscribeUrl}}" style="font-size: 12px; color: #71717a; text-decoration: underline;">Abonnement opzeggen</a>
                    <span style="font-size: 12px; color: #a1a1aa; margin: 0 8px;">&middot;</span>
                    <div style="display: inline-block; width: 20px; height: 20px; line-height: 20px; background-color: #18181b; border-radius: 4px; text-align: center; font-size: 10px; font-weight: 700; color: #ffffff; vertical-align: middle;">K</div>
                    <span style="font-size: 12px; color: #71717a; vertical-align: middle; margin-left: 6px;">&copy; 2025 Kees</span>
                  </td>
                </tr>
                <tr>
                  <td align="center" style="padding-top: 8px;">
                    <p style="margin: 0; font-size: 11px; color: #a1a1aa; text-align: center;">Dit is een geautomatiseerde notificatie. Reageer niet op deze e-mail.</p>
                  </td>
                </tr>
              </table>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
