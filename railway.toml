# Railway configuration for te9.dev SvelteKit application

[build]
builder = "NIXPACKS"

[deploy]
healthcheckPath = "/"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "te9.dev-site"

[services.variables]
NODE_ENV = "production"
PORT = "8080"
